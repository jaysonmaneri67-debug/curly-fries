<!DOCTYPE html>
<style>

body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
}


header {
    background: #222;
    padding: 25px;
    border-bottom: 3px solid purple;
}


h1 {
    font-size: 40px;
    margin: 0;
}


nav {
    padding: 20px;
}


button {
    background: purple;
    color: white;
    border: none;
    padding: 12px 20px;
    margin: 5px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}


button:hover {
    background: #9b30ff;
}


.section {

    background: #1c1c1c;
    margin: 20px auto;
    padding: 20px;

    width: 80%;
    max-width: 600px;

    border-radius: 15px;
    box-shadow: 0 0 15px black;

}


.hidden {
    display: none;
}


input {

    padding: 12px;
    width: 70%;

    border-radius: 8px;
    border: none;

    margin: 10px;

    font-size: 16px;

}


#characterResults p {

    .card {

background:#333;
margin:15px;
padding:15px;
border-radius:15px;
border:2px solid purple;

}


.card h3 {

color:#c77dff;
font-size:25px;

};

}


#newsOutput {

    margin-top: 20px;
    background: #300;
    padding: 15px;
    border-radius: 10px;

}


footer {

    margin-top: 50px;
    padding: 20px;

    background: #222;

}


</style>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plush Kaisen</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Plush Kaisen</h1>
    <p>JJK + Plush Universe Database</p>
</header>

<nav>
    <button onclick="showSection('characters')">Characters</button>
    <button onclick="showSection('news')">News</button>
    <button onclick="showSection('funfacts')">Fun Facts</button>
</nav>


<section id="characters" class="section">
    <h2>Characters</h2>

    <input id="searchBox" placeholder="Search characters...">

    <button onclick="searchCharacter()">Search</button>

    <div id="characterResults"></div>
</section>


<section id="news" class="section hidden">
    <h2>Breaking News</h2>

    <input id="newsName" placeholder="News headline">

    <button onclick="generateNews()">Generate</button>

    <div id="newsOutput">
    </div>
</section>


<section id="funfacts" class="section hidden">
    <h2>Fun Facts</h2>

    <button onclick="randomFact()">Random Fact</button>

    <p id="factOutput"></p>
</section>


<footer>
    <p>Made for the Plush Kaisen universe</p>
</footer>


<script>

function showSection(sectionId) {
    let sections = document.querySelectorAll(".section");

    sections.forEach(section => {
        section.classList.add("hidden");
    });

    document.getElementById(sectionId).classList.remove("hidden");
}


const characters = [

{
name:"Bonnie",
grade:"Special Grade",
ability:"Blind silence",
domain:"Noise drowned out by the loud ring of silence"
},

{
name:"Nightmare Bonnie",
grade:"Special Grade",
ability:"cursed consumption",
domain:"Devour of doom"
},

{
name:"Monty",
grade:"Semi grade 1",
ability:"Ruin Drive",
domain:"See ya later alligator"
},

{
name:"Foxy",
grade:"Grade 1",
ability:"Strategic Combat",
domain:"Pirates Cove"
},

{
name:"Puppet",
grade:"Grade 1",
ability:"Cloning Technique",
domain:"Uncanny Replica Theater"
},

{
name:"Freddy",
grade:"Grade 1",
ability:"Breaking News",
domain:"Broadcast Domain"
},

{
name:"Freddy Twin",
grade:"Grade 20",
ability:"being dumb af",
domain:"he dont got one twinito"
}

];


function searchCharacter(){

let search = document.getElementById("searchBox").value.toLowerCase();

let results = characters.filter(character =>
character.name.toLowerCase().includes(search)
);


let output = document.getElementById("characterResults");

output.innerHTML = "";


if(results.length === 0){

output.innerHTML="<p>No character found.</p>";

return;

}


results.forEach(character=>{

output.innerHTML += `

<div class="card">

<h3>${character.name}</h3>

<p>⭐ ${character.grade}</p>

<p>⚔️ Ability: ${character.ability}</p>

<p>🏯 Domain: ${character.domain}</p>

</div>

`;

});


}


function generateNews() {

    let headline = document.getElementById("newsName").value;

    let output = document.getElementById("newsOutput");


    if(headline === "") {

        output.innerHTML = 
        "<p>Type something first!</p>";

        return;
    }


    output.innerHTML =
    `<h3>🚨 BREAKING NEWS 🚨</h3>
     <p>${headline}</p>`;

    document.getElementById("newsName").value = "";

}



const facts = [
    "Nightmare Bonnie gained power from rage energy.",
    "Foxy is the strategist of the group.",
    "Puppet specializes in cloning abilities.",
    "Freddy is the universe's news reporter.",
    "Bonnie is the gamer of the team.",
    "Monty uses raw power and aggression."
];


function randomFact() {

    let random =
    facts[Math.floor(Math.random() * facts.length)];

    document.getElementById("factOutput").innerHTML =
    random;

}


</script>

</body>
</html>
